# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: >
      Ask the user for missing information.

      Always provide response_type.

      Use response_type=text for free-form information such as:
      usernames, handles, URLs, topics, keywords, titles, or other missing details.

      Use response_type=yes_no only for confirmation questions.

      Use response_type=choice only when selecting from explicit options.
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: >
      Search the web.

      Always provide topic.

      For news, always provide timeframe.

      Use topic=news for:
      news, headlines, current events,
      "tin tức", "tin mới", "hôm nay",
      "tuần này", "tháng này", "năm nay".

      Use topic=general for evergreen information.

      Extract only the main subject into query.

      Examples:

      "Tin tức AI hôm nay"
      -> query="AI", topic="news", timeframe="day"

      "Tin Nvidia tuần này"
      -> query="Nvidia", topic="news", timeframe="week"

      "Tin OpenAI tháng này"
      -> query="OpenAI", topic="news", timeframe="month"

      If topic=news:
        timeframe=day for "hôm nay"
        timeframe=week for "tuần này"
        timeframe=month for "tháng này"
        timeframe=year for "năm nay"

      Do not omit timeframe when topic=news.
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: >
      Send content to an external destination.

      This tool performs an external write action.

      Never call this tool without explicit user confirmation.

      If the user asks to send, publish, post, upload,
      share, submit, distribute, email, or post to social media,
      first call clarify with response_type=yes_no.

      Ask only for confirmation.

      Do not ask for missing content before confirmation.

      Do not call send directly.

      Only call send after the user explicitly confirms.
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  - name: trending
    description: >
      Get trending topics on X/Twitter for a given country.

      Use this when the user asks what is trending, popular, or viral on social media
      in a specific country or globally.

      Always pass country in English (e.g. "Vietnam", "United States", "worldwide").
    parameters:
      type: object
      properties:
        country: {type: string, default: "worldwide", description: "Quốc gia hoặc 'worldwide'"}
        limit: {type: integer, default: 10, description: "Số chủ đề"}
      required: []

  - name: profile
    description: >
      Get public profile information for a Twitter/X account.

      Use this before calling timeline when you need to verify an account exists
      or show the user bio, follower count, and verification status.

      Pass the screenname without the @ symbol.
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản (không có @)"}
      required: [screenname]

  - name: arxiv_related
    description: >
      Find related arXiv papers given an arXiv paper ID or URL.

      Use this after papers or paper_text when the user wants to explore
      similar or follow-up research in the same field.

      Pass the arXiv ID or full URL (e.g. "2401.12345" or "https://arxiv.org/abs/2401.12345").
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "arXiv ID hoặc URL"}
        max_results: {type: integer, default: 5, description: "Số bài"}
      required: [arxiv_url]

  - name: summarize
    description: >
      Extract and rank the most relevant key points from a list of items
      returned by lookup, fetch, papers, or paper_text.

      Use this when the user asks for a summary, key takeaways, or highlights
      from multiple sources.

      Pass the items array directly from the previous tool result.
      Optionally pass focus to score sentences toward a specific angle.
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item từ kết quả công cụ khác"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
        focus: {type: string, default: "", description: "Góc độ tóm tắt (tuỳ chọn)"}
        max_points: {type: integer, default: 5, description: "Số điểm chính"}
        style: {type: string, enum: [bullets, numbered], default: "bullets", description: "Định dạng"}
      required: [items]
